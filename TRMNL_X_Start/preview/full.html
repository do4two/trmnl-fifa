<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://trmnl.com/css/3.1.1/plugins.css">
  <style>
    html, body { width: 1872px; height: 1404px; margin: 0; overflow: hidden; }
  </style>
</head>
<body class="trmnl environment">
  <div class="screen screen--v2 screen--4bit">
    <div class="view view--full">
      <style>
        .x-canvas { box-sizing:border-box; display:flex; flex:1 1 100%; flex-direction:column; align-self:stretch; width:100%; height:100%; min-width:0; min-height:0; padding:1.2cqw; gap:1cqh; overflow:hidden; background:#fff; color:#000; font-family:"Inter Variable",Inter,Arial,sans-serif; }
        .trmnl .layout > .x-canvas { flex:1 1 100%!important; align-self:stretch!important; width:100%!important; height:100%!important; max-width:100%!important; max-height:100%!important; }
        .x-canvas * { box-sizing:border-box; }
        .x-header,.x-footer { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:1cqw; min-width:0; font-size:clamp(10px,1.25cqw,18px); }
        .x-header { padding-bottom:.6cqh; border-bottom:2px solid #000; }
        .x-title { font-size:clamp(14px,2.2cqw,32px); font-weight:700; }
        .x-content { flex:1 1 auto; display:grid; place-items:center; min-width:0; min-height:0; overflow:hidden; border:2px solid #000; }
        .x-content-inner { width:min(88%,720px); text-align:center; }
        .x-value { font-size:clamp(28px,8cqw,96px); line-height:1; font-weight:700; }
        .x-description { margin-top:1cqh; font-size:clamp(12px,2cqw,28px); }
        .x-footer { padding-top:.6cqh; border-top:2px solid #000; }
      </style>
      <div class="layout layout--col">
        <div class="x-canvas">
          <div class="x-header"><span class="x-title">TRMNL X Starter · Full</span><span>Preview</span></div>
          <div class="x-content"><div class="x-content-inner"><div class="x-value">100%</div><div class="x-description">Der Canvas füllt den vollständigen View.</div></div></div>
          <div class="x-footer"><span>Full</span><span>Layout → Canvas</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
