<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://trmnl.com/css/3.1.1/plugins.css">
  <style>
    html, body { width:1872px; height:1404px; margin:0; overflow:hidden; }
    .x-canvas { box-sizing:border-box; display:flex; flex:1 1 100%; flex-direction:column; align-self:stretch; width:100%; height:100%; min-width:0; min-height:0; padding:1.2cqw; gap:1cqh; overflow:hidden; background:#fff; color:#000; font-family:"Inter Variable",Inter,Arial,sans-serif; }
    .trmnl .layout > .x-canvas { flex:1 1 100%!important; align-self:stretch!important; width:100%!important; height:100%!important; max-width:100%!important; max-height:100%!important; }
    .x-header { flex:0 0 auto; display:flex; justify-content:space-between; gap:1cqw; padding-bottom:.6cqh; border-bottom:2px solid #000; font-size:clamp(11px,2cqw,24px); font-weight:700; }
    .x-content { flex:1 1 auto; display:grid; place-items:center; min-height:0; border:2px solid #000; font-size:clamp(22px,8cqw,70px); font-weight:700; }
  </style>
</head>
<body class="trmnl environment">
  <div class="screen screen--v2 screen--4bit">
    <div class="mashup mashup--2x2">
      <div class="view view--quadrant"><div class="layout layout--col"><div class="x-canvas"><div class="x-header"><span>Quadrant 1</span></div><div class="x-content">¼</div></div></div></div>
      <div class="view view--quadrant"><div class="layout layout--col"><div class="x-canvas"><div class="x-header"><span>Quadrant 2</span></div><div class="x-content">¼</div></div></div></div>
      <div class="view view--quadrant"><div class="layout layout--col"><div class="x-canvas"><div class="x-header"><span>Quadrant 3</span></div><div class="x-content">¼</div></div></div></div>
      <div class="view view--quadrant"><div class="layout layout--col"><div class="x-canvas"><div class="x-header"><span>Quadrant 4</span></div><div class="x-content">¼</div></div></div></div>
    </div>
  </div>
</body>
</html>
