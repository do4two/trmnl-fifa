name: build-trmnl-data

# Baut output JSON aus openfootball und veröffentlicht sie über GitHub Pages,
# damit TRMNL sie per Polling abholen kann.
on:
  schedule:
    - cron: "*/30 * * * *"   # alle 30 Minuten
  workflow_dispatch:           # manuell startbar (Actions-Tab → "Run workflow")
  push:
    branches: [main]           # bei jedem Push neu bauen

# Rechte, die der Pages-Deploy braucht
permissions:
  contents: read
  pages: write
  id-token: write

# verhindert, dass sich gleichzeitige Deploys überholen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python src/build_data.py --out public/trmnl_data.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
